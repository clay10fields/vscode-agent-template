# LiteLLM proxy config — friendly names → providers, with Ollama fallback.
# Start with: scripts/litellm-up.sh
# Cline/Roo/Continue all point at http://localhost:4000

model_list:
  # ------------------------------------------------------------------
  # HEAD DEV — architecture, code review, hardest reasoning
  # ------------------------------------------------------------------
  - model_name: head-dev
    litellm_params:
      model: openrouter/anthropic/claude-opus-4.6
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: head-dev
    litellm_params:
      model: ollama/qwen3:32b
      api_base: os.environ/OLLAMA_HOST

  # ------------------------------------------------------------------
  # CO-LEAD — planning, research, docs
  # ------------------------------------------------------------------
  - model_name: co-lead
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4.6
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: co-lead
    litellm_params:
      model: openrouter/google/gemini-2.5-pro
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: co-lead
    litellm_params:
      model: ollama/qwen3:14b
      api_base: os.environ/OLLAMA_HOST

  # ------------------------------------------------------------------
  # CODE GEN — write code, fix bugs, refactor
  # ------------------------------------------------------------------
  - model_name: code-gen
    litellm_params:
      model: openrouter/deepseek/deepseek-v3.5
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: code-gen
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4.6
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: code-gen
    litellm_params:
      model: ollama/qwen2.5-coder:32b
      api_base: os.environ/OLLAMA_HOST

  # ------------------------------------------------------------------
  # AUTOCOMPLETE — inline, fast, local-preferred
  # ------------------------------------------------------------------
  - model_name: autocomplete
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: os.environ/OLLAMA_HOST
  - model_name: autocomplete
    litellm_params:
      model: openrouter/mistralai/codestral-2501
      api_key: os.environ/OPENROUTER_API_KEY

  # ------------------------------------------------------------------
  # QUICK SHELL — short terminal tasks
  # ------------------------------------------------------------------
  - model_name: quick-shell
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4.6
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: quick-shell
    litellm_params:
      model: ollama/qwen2.5-coder:14b
      api_base: os.environ/OLLAMA_HOST

  # ------------------------------------------------------------------
  # LONG RUNNER — overnight tasks, prompt caching
  # ------------------------------------------------------------------
  - model_name: long-runner
    litellm_params:
      model: openrouter/moonshotai/kimi-k2
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: long-runner
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4.6
      api_key: os.environ/OPENROUTER_API_KEY

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 300
  fallbacks:
    - head-dev: [co-lead]
    - code-gen: [head-dev]
    - quick-shell: [code-gen]

litellm_settings:
  drop_params: true
  set_verbose: false
  cache: true
  cache_params:
    type: local

general_settings:
  master_key: litellm-local
  database_url: sqlite:///./.litellm-cache/litellm.db
